<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TaskDock</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f7f5;--bg3:#f0ede8;--bg4:#e8e4dd;
  --text:#1c1c1a;--text2:#706e69;--text3:#a8a5a0;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.14);
  --accent:#2563eb;
  --r6:6px;--r10:10px;--r14:14px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;font-size:13px;line-height:1.5;
  -webkit-font-smoothing:antialiased;user-select:none}

/* ══ WORKSPACE SWITCHER DROPDOWN ══ */
#wsSwitcher{position:fixed;inset:0;z-index:500;display:none}
#wsSwitcher.open{display:block}
#wsBackdrop{position:absolute;inset:0;background:rgba(0,0,0,.25)}
#wsPanel{position:absolute;top:46px;left:12px;width:260px;background:var(--bg);
  border-radius:var(--r14);box-shadow:0 8px 32px rgba(0,0,0,.18);
  border:1px solid var(--border2);overflow:hidden;animation:wsIn .15s ease}
@keyframes wsIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.ws-head{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.ws-head-name{font-size:13.5px;font-weight:700}
.ws-head-plan{font-size:11px;color:var(--text3);margin-top:1px}
.ws-actions{display:flex;gap:6px;padding:10px 14px;border-bottom:1px solid var(--border)}
.ws-act-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:var(--r6);
  border:1px solid var(--border2);background:var(--bg);cursor:pointer;font-size:12px;
  color:var(--text2);font-family:inherit;transition:all .1s;white-space:nowrap}
.ws-act-btn:hover{background:var(--bg2);color:var(--text)}
.ws-act-btn.active-ws{border-color:var(--accent);color:var(--accent);background:var(--accent-bg,#eff6ff)}
.ws-list{padding:6px 0}
.ws-list-item{display:flex;align-items:center;gap:9px;padding:7px 14px;cursor:pointer;
  transition:background .1s;position:relative}
.ws-list-item:hover{background:var(--bg2)}
.ws-avatar{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.ws-item-name{flex:1;font-size:13px;font-weight:500}
.ws-item-check{color:var(--accent);font-size:13px}
.ws-divider{height:1px;background:var(--border);margin:4px 0}
.ws-new{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;
  color:var(--accent);font-size:13px;font-weight:500;transition:background .1s}
.ws-new:hover{background:var(--bg2)}
.ws-add-acct{padding:8px 14px;font-size:12px;color:var(--text3);
  border-top:1px solid var(--border);cursor:pointer;transition:background .1s}
.ws-add-acct:hover{background:var(--bg2);color:var(--text2)}

/* ══ TOPBAR ══ */
#topbar{height:46px;display:flex;align-items:center;border-bottom:1px solid var(--border);
  background:var(--bg);flex-shrink:0;z-index:20;position:relative}
.tb-ws-btn{display:flex;align-items:center;gap:7px;padding:0 14px;height:100%;
  border-right:1px solid var(--border);cursor:pointer;flex-shrink:0;min-width:200px;
  max-width:320px;transition:background .12s;user-select:none}
.tb-ws-btn:hover{background:var(--bg2)}
.tb-ws-avatar{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.tb-ws-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.tb-ws-chevron{color:var(--text3);font-size:10px;flex-shrink:0}
.tb-center{flex:1;display:flex;align-items:center;padding:0 18px;gap:14px;min-width:0}
.tb-date{font-size:12.5px;font-weight:600;flex-shrink:0}
.tb-sub{font-size:11px;color:var(--text3);flex-shrink:0}
.tb-prog{flex:1;max-width:200px}
.tb-prog-lbl{font-size:10px;color:var(--text3);margin-bottom:2px}
.pbar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.pbar-fill{height:100%;background:#047857;border-radius:2px;transition:width .3s}
.tb-right{display:flex;align-items:center;gap:3px;padding:0 12px;height:100%;
  border-left:1px solid var(--border);flex-shrink:0}
.tb-btn{padding:4px 10px;border:none;background:none;cursor:pointer;font-size:12px;
  color:var(--text2);border-radius:var(--r6);font-family:inherit;transition:all .12s;white-space:nowrap}
.tb-btn:hover,.tb-btn.active{background:var(--bg2);color:var(--text);font-weight:500}

/* ══ BODY ══ */
#body{display:flex;flex:1;overflow:hidden;position:relative}

/* ══ SIDEBAR ══ */
#sidebar{min-width:140px;max-width:420px;border-right:1px solid var(--border);
  display:flex;flex-direction:column;background:var(--bg2);overflow:hidden;flex-shrink:0;position:relative}
#sidebar.closed{width:0!important;min-width:0!important}
.resize-handle{position:absolute;top:0;width:5px;height:100%;cursor:col-resize;
  z-index:30;background:transparent;transition:background .15s}
.resize-handle:hover,.resize-handle.dragging{background:rgba(37,99,235,.4)}
#sb-resizer{right:-3px}
#np-resizer{left:-3px}
.sb-search{padding:8px 10px;border-bottom:1px solid var(--border)}
.sb-sbox{display:flex;align-items:center;gap:5px;padding:5px 9px;background:var(--bg);
  border:1px solid var(--border2);border-radius:var(--r6);cursor:pointer;font-size:12px;color:var(--text3)}
.sb-sbox:hover{border-color:rgba(0,0,0,.22)}
.sb-projs{flex:1;overflow-y:auto;padding:5px 0}
.sb-sec{font-size:9.5px;font-weight:700;color:var(--text3);letter-spacing:.08em;
  text-transform:uppercase;padding:8px 13px 3px}
.sb-item{display:flex;align-items:center;gap:7px;padding:5px 13px;cursor:pointer;
  color:var(--text2);font-size:12.5px;transition:background .1s;position:relative}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sb-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-cnt{font-size:10px;color:var(--text3);background:var(--bg4);border-radius:10px;padding:1px 6px;flex-shrink:0}
.sb-add{display:flex;align-items:center;gap:7px;padding:5px 13px;cursor:pointer;color:var(--text3);
  font-size:12px;border:none;background:none;width:100%;text-align:left;font-family:inherit;transition:all .12s}
.sb-add:hover{background:var(--bg3);color:var(--text)}

/* ══ MAIN ══ */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.qabar{display:flex;align-items:center;gap:7px;padding:7px 16px;
  border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.qa-in{flex:1;border:1px solid var(--border2);border-radius:var(--r6);padding:6px 10px;
  font-size:13px;font-family:inherit;color:var(--text);outline:none;background:var(--bg2);
  transition:border-color .12s,background .12s;user-select:text}
.qa-in:focus{border-color:var(--accent);background:var(--bg)}
.qa-sel{padding:5px 9px;border:1px solid var(--border2);border-radius:var(--r6);
  background:var(--bg);color:var(--text);font-size:12px;font-family:inherit;outline:none;cursor:pointer;max-width:140px}
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:var(--r6);
  font-size:12.5px;font-weight:500;cursor:pointer;border:1px solid transparent;
  font-family:inherit;transition:all .12s;white-space:nowrap;user-select:none}
.btn-primary{background:var(--text);color:#fff}
.btn-primary:hover{background:#2c2c2a}
.btn-ghost{background:none;border-color:var(--border2);color:var(--text2)}
.btn-ghost:hover{background:var(--bg2);color:var(--text)}
.btn-sm{padding:3px 9px;font-size:11.5px}
.btn-danger{background:none;border-color:#fca5a5;color:#b91c1c}
.btn-danger:hover{background:#fee2e2}

/* ══ TASK LIST ══ */
#tlWrap{flex:1;overflow-y:auto}
.pg{margin-bottom:0}
.pg-hdr{display:flex;align-items:center;gap:7px;padding:8px 16px;
  position:sticky;top:0;background:var(--bg);z-index:8;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;user-select:none}
.pg-hdr:hover{background:var(--bg2)}
.pg-arrow{font-size:9px;color:var(--text3);transition:transform .15s;flex-shrink:0}
.pg-arrow.coll{transform:rotate(-90deg)}
.pg-bar{width:3px;height:14px;border-radius:2px;flex-shrink:0}
.pg-title{font-size:12.5px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pg-meta{font-size:10.5px;color:var(--text3);flex-shrink:0}
.pg-add{font-size:10.5px;color:var(--text3);background:none;border:1px solid var(--border2);
  padding:2px 8px;border-radius:10px;cursor:pointer;font-family:inherit;transition:all .12s;flex-shrink:0}
.pg-add:hover{background:var(--bg2);color:var(--text)}

/* ══ TASK ROW ══ */
.tr{display:flex;align-items:center;padding:0 16px;min-height:38px;
  border-bottom:1px solid var(--border);cursor:pointer;position:relative;transition:background .1s}
.tr:hover{background:var(--bg2)}
.tr.drag-over-top{border-top:2px solid var(--accent)!important}
.tr.drag-over-bot{border-bottom:2px solid var(--accent)!important}
.tr.dragging{opacity:.28;background:var(--bg3)}
/* invisible drop zone at section boundary */
.drop-zone-inv{height:24px;width:100%;background:transparent}
.drop-zone-inv.active{background:rgba(37,99,235,.06);border-top:2px solid var(--accent)}
.dh{color:var(--text3);font-size:10px;padding:0 5px 0 0;cursor:grab;opacity:0;flex-shrink:0}
.tr:hover .dh{opacity:1}
.chk{width:15px;height:15px;border-radius:50%;border:1.5px solid;background:none;
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  margin-right:9px;transition:all .15s;padding:0}
.chk.checked::after{content:'✓';color:#fff;font-size:8px;font-weight:700}
.tr-nw{flex:1;min-width:0;display:flex;flex-direction:column}
.tr-nm{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.tr-nm.done{text-decoration:line-through;color:var(--text3)}
.tr-sb{font-size:10.5px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.tr-right{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:10px}
.tr-due{font-size:11px;color:var(--text3);white-space:nowrap}
.tr-due.ov{color:#b91c1c;font-weight:500}
.tr-due.sn{color:#b45309;font-weight:500}
.done-hdr{display:flex;align-items:center;gap:6px;padding:6px 16px;
  background:var(--bg2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.done-hdr:hover{background:var(--bg3)}
.done-arrow{font-size:9px;color:var(--text3);transition:transform .15s}
.done-arrow.coll{transform:rotate(-90deg)}
.done-lbl{font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}

/* ══ NOTES PANEL ══ */
#np{min-width:160px;max-width:480px;border-left:1px solid var(--border);
  display:flex;flex-direction:column;background:var(--bg);overflow:hidden;flex-shrink:0;position:relative}
#np.closed{width:0!important;min-width:0!important}
.np-hdr{padding:10px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.np-title{font-size:12.5px;font-weight:600}
.np-cnt{font-size:10.5px;color:var(--text3)}
.np-in-area{padding:8px 11px;border-bottom:1px solid var(--border);flex-shrink:0}
.np-ta{width:100%;border:1px solid var(--border2);border-radius:var(--r6);padding:6px 9px;
  font-size:12px;font-family:inherit;color:var(--text);outline:none;resize:none;
  min-height:60px;background:var(--bg2);line-height:1.5;transition:border-color .12s;user-select:text}
.np-ta:focus{border-color:var(--accent);background:var(--bg)}
.np-ft{display:flex;align-items:center;gap:5px;margin-top:5px}
.np-ps{flex:1;font-size:11.5px;border:1px solid var(--border2);border-radius:var(--r6);
  padding:4px 8px;background:var(--bg);color:var(--text);font-family:inherit;outline:none;min-width:0}
.np-list{flex:1;overflow-y:auto}
.nc{padding:10px 13px;border-bottom:1px solid var(--border);position:relative;transition:background .1s;cursor:default}
.nc:hover{background:var(--bg2)}
.nc-proj{font-size:9.5px;font-weight:700;letter-spacing:.04em;margin-bottom:3px}
.nc-body{font-size:12px;color:var(--text);line-height:1.55;min-height:18px;white-space:pre-wrap;word-break:break-all;user-select:text}
.nc-edit-ta{display:none;width:100%;border:1px solid var(--accent);border-radius:var(--r6);
  padding:5px 7px;font-size:12px;font-family:inherit;color:var(--text);outline:none;
  resize:none;background:var(--bg);line-height:1.5;min-height:60px;user-select:text}
.nc-date{font-size:10px;color:var(--text3);margin-top:4px}
.nc-save-row{display:none;gap:4px;margin-top:5px}
.nc-actions{display:none;gap:3px;position:absolute;top:7px;right:10px}
.nc:hover .nc-actions{display:flex}
.nc-act{background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;
  padding:2px 6px;border-radius:4px;font-family:inherit;transition:all .1s}
.nc-act:hover{background:var(--bg3);color:var(--text)}
.nc-act.del:hover{background:#fee2e2;color:#b91c1c}

/* ══ CONTEXT MENU ══ */
#ctxMenu{position:fixed;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r10);
  box-shadow:0 8px 24px rgba(0,0,0,.14);min-width:150px;z-index:400;
  padding:4px 0;display:none;overflow:hidden}
#ctxMenu.open{display:block;animation:ctxIn .1s ease}
@keyframes ctxIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.ctx-item{padding:8px 14px;cursor:pointer;font-size:13px;color:var(--text2);
  display:flex;align-items:center;gap:8px;transition:background .1s}
.ctx-item:hover{background:var(--bg2);color:var(--text)}
.ctx-item.danger{color:#b91c1c}
.ctx-item.danger:hover{background:#fee2e2}
.ctx-sep{height:1px;background:var(--border);margin:3px 0}

/* ══ MODALS ══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:300;
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .15s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg);border-radius:var(--r14);width:100%;max-width:420px;
  max-height:88vh;overflow-y:auto;transform:translateY(10px);transition:transform .15s;
  box-shadow:0 20px 60px rgba(0,0,0,.15)}
.overlay.open .modal{transform:translateY(0)}
.mhd{padding:15px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mttl{font-size:14px;font-weight:600}
.mx{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:3px;border-radius:4px}
.mx:hover{background:var(--bg2);color:var(--text)}
.mbody{padding:15px 18px}
.mft{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:7px;justify-content:flex-end}
.fg{margin-bottom:12px}
.fl{display:block;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.fi{width:100%;padding:6px 9px;border:1px solid var(--border2);border-radius:var(--r6);
  background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;outline:none;
  transition:border-color .12s;user-select:text}
.fi:focus{border-color:var(--accent)}
.fi-ta{width:100%;min-height:64px;padding:6px 9px;border:1px solid var(--border2);border-radius:var(--r6);
  background:var(--bg);color:var(--text);font-size:12.5px;font-family:inherit;
  outline:none;resize:vertical;line-height:1.5;transition:border-color .12s;user-select:text}
.fi-ta:focus{border-color:var(--accent)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ══ DETAIL ══ */
.det-ov{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:200;opacity:0;pointer-events:none;transition:opacity .15s}
.det-ov.open{opacity:1;pointer-events:all}
.det-p{position:fixed;top:0;right:-520px;width:460px;max-width:100vw;height:100vh;
  background:var(--bg);border-left:1px solid var(--border);z-index:210;overflow-y:auto;
  transition:right .2s ease;box-shadow:-4px 0 24px rgba(0,0,0,.08)}
.det-p.open{right:0}
.det-top{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;
  gap:7px;position:sticky;top:0;background:var(--bg);z-index:2}
.det-body{padding:18px}
.det-title{font-size:18px;font-weight:600;border:none;outline:none;background:transparent;
  color:var(--text);width:100%;font-family:inherit;margin-bottom:13px;line-height:1.3;user-select:text}
.det-props{border:1px solid var(--border);border-radius:var(--r6);overflow:hidden;margin-bottom:14px}
.dpr{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:12.5px}
.dpr:last-child{border-bottom:none}
.dpl{color:var(--text3);width:72px;flex-shrink:0;font-size:11.5px}
.dpv{flex:1}
.dpv select,.dpv input{border:none;background:transparent;font-size:12.5px;font-family:inherit;color:var(--text);cursor:pointer;outline:none;width:100%;user-select:text}
.det-nl{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.det-nt{width:100%;min-height:110px;border:1px solid var(--border);border-radius:var(--r6);
  padding:8px 10px;font-size:12.5px;font-family:inherit;color:var(--text);background:var(--bg);
  resize:vertical;outline:none;line-height:1.6;transition:border-color .12s;user-select:text}
.det-nt:focus{border-color:var(--accent)}

/* ══ TOAST ══ */
#undoToast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#1c1c1a;color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;
  opacity:0;transition:all .2s;z-index:600;pointer-events:none;white-space:nowrap}
#undoToast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══ ADD WS MODAL ══ */
.ws-color-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.ws-color-opt{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.ws-color-opt:hover{transform:scale(1.15)}
.ws-color-opt.sel{border-color:var(--text);transform:scale(1.1)}

.empty-s{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-s .ei{font-size:30px;margin-bottom:8px}
.empty-s p{font-size:12.5px}
@media(max-width:660px){
  #sidebar{position:fixed;left:-100%;top:0;height:100vh;z-index:80;width:240px!important;min-width:240px!important;transition:left .2s ease;box-shadow:2px 0 16px rgba(0,0,0,.1)}
  #sidebar.mob-open{left:0}
  #np{display:none}
}

/* ══ AI PANEL ══ */
#aiPanel{position:fixed;top:0;right:-480px;width:440px;max-width:100vw;height:100vh;
  background:var(--bg);border-left:1px solid var(--border2);z-index:250;
  display:flex;flex-direction:column;transition:right .22s cubic-bezier(.4,0,.2,1);
  box-shadow:-6px 0 32px rgba(0,0,0,.1)}
#aiPanel.open{right:0}
.ai-top{display:flex;align-items:center;gap:10px;padding:13px 16px;
  border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.ai-top-icon{width:28px;height:28px;border-radius:8px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ai-top-title{font-size:13.5px;font-weight:700}
.ai-top-sub{font-size:10.5px;color:var(--text3);margin-top:1px}
.ai-close{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;
  padding:5px 6px;border-radius:var(--r6);transition:all .1s;margin-left:auto}
.ai-close:hover{background:var(--bg3);color:var(--text)}

<script>
/* ══════════ CONSTANTS ══════════ */
const PFX='td4_';
const PC=['#2563eb','#7c3aed','#0891b2','#059669','#d97706','#dc2626','#db2777','#65a30d','#0f766e','#9333ea'];
const WS_COLORS=['#2563eb','#7c3aed','#059669','#d97706','#dc2626','#0891b2','#db2777','#1c1c1a'];

/* ══════════ STATE ══════════ */
let workspaces=[],curWsId='',projects=[],tasks=[],notes=[],colSt={},doneSt={},curTask=null,_dragId=null;
let _ctxTarget=null,_ctxType=null; // context menu state
let undoStack=[];

/* ══════════ UNDO ══════════ */
function snapshot(){
  undoStack.push({ws:JSON.stringify(workspaces),p:JSON.stringify(projects),t:JSON.stringify(tasks),n:JSON.stringify(notes)});
  if(undoStack.length>60)undoStack.shift();
}
function undo(){
  if(!undoStack.length)return;
  const s=undoStack.pop();
  workspaces=JSON.parse(s.ws);projects=JSON.parse(s.p);tasks=JSON.parse(s.t);notes=JSON.parse(s.n);
  save();renderAll();showToast('元に戻しました');
}

/* ══════════ STORAGE ══════════ */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function save(){
  localStorage.setItem(PFX+'ws',JSON.stringify(workspaces));
  localStorage.setItem(PFX+'cwid',curWsId);
  localStorage.setItem(PFX+'p',JSON.stringify(projects));
  localStorage.setItem(PFX+'t',JSON.stringify(tasks));
  localStorage.setItem(PFX+'n',JSON.stringify(notes));
  localStorage.setItem(PFX+'cs',JSON.stringify(colSt));
  localStorage.setItem(PFX+'ds',JSON.stringify(doneSt));
}
function load(){
  try{
    workspaces=JSON.parse(localStorage.getItem(PFX+'ws')||'[]');
    curWsId=localStorage.getItem(PFX+'cwid')||'';
    projects=JSON.parse(localStorage.getItem(PFX+'p')||'[]');
    tasks=JSON.parse(localStorage.getItem(PFX+'t')||'[]');
    notes=JSON.parse(localStorage.getItem(PFX+'n')||'[]');
    colSt=JSON.parse(localStorage.getItem(PFX+'cs')||'{}');
    doneSt=JSON.parse(localStorage.getItem(PFX+'ds')||'{}');
  }catch(e){workspaces=[];projects=[];tasks=[];notes=[]}
  if(!workspaces.length)seed();
  if(!curWsId||!workspaces.find(w=>w.id===curWsId))curWsId=workspaces[0].id;
}
function wsProjColor(pid){
  const wp=wsProjects();const i=wp.findIndex(p=>p.id===pid);return PC[i>=0?i%PC.length:0];
}
function wsProjects(){return projects.filter(p=>p.wsId===curWsId)}
function wsTasks(){return tasks.filter(t=>wsProjects().some(p=>p.id===t.projectId))}
function wsNotes(){return notes.filter(n=>!n.projectId||wsProjects().some(p=>p.id===n.projectId))}

function seed(){
  const ws1={id:uid(),name:'スタジアム施設管理',color:'#2563eb',createdAt:Date.now()};
  const ws2={id:uid(),name:'プライベート',color:'#059669',createdAt:Date.now()};
  workspaces=[ws1,ws2];curWsId=ws1.id;
  const n=Date.now();
  const p1={id:uid(),wsId:ws1.id,name:'メインスタンド改修',createdAt:n};
  const p2={id:uid(),wsId:ws1.id,name:'照明設備更新',createdAt:n};
  const p3={id:uid(),wsId:ws1.id,name:'バリアフリー対応',createdAt:n};
  const p4={id:uid(),wsId:ws2.id,name:'個人タスク',createdAt:n};
  projects=[p1,p2,p3,p4];
  function fd(d){const x=new Date();x.setDate(x.getDate()+d);return x.toISOString().slice(0,10)}
  tasks=[
    {id:uid(),projectId:p1.id,name:'現状調査・劣化診断',done:true,due:'2024-03-15',notes:'専門業者による診断完了。報告書参照。',createdAt:n-9e7},
    {id:uid(),projectId:p1.id,name:'設計会社への見積依頼',done:true,due:'2024-04-01',notes:'A社・B社・C社に依頼済み',createdAt:n-8e7},
    {id:uid(),projectId:p1.id,name:'改修基本設計のレビュー',done:false,due:fd(7),notes:'A社提案の基本設計を確認すること',createdAt:n-5e7},
    {id:uid(),projectId:p1.id,name:'Jリーグへの改修申請',done:false,due:fd(14),notes:'スタジアム基準適合チェックリスト添付',createdAt:n-3e7},
    {id:uid(),projectId:p1.id,name:'工事業者の入札手続き',done:false,due:fd(30),notes:'',createdAt:n-2e7},
    {id:uid(),projectId:p2.id,name:'LED照明メーカー選定',done:true,due:'2024-05-10',notes:'パナ・東芝・コイズミで比較検討',createdAt:n-6e7},
    {id:uid(),projectId:p2.id,name:'電力系統の容量確認',done:false,due:fd(5),notes:'50kW追加対応が必要か確認中',createdAt:n-4e7},
    {id:uid(),projectId:p2.id,name:'照度シミュレーション実施',done:false,due:fd(10),notes:'TV放映基準2000lux以上を確保',createdAt:n-3e7},
    {id:uid(),projectId:p3.id,name:'バリアフリー現状調査',done:true,due:'2024-04-20',notes:'障がい者団体ヒアリング実施済み',createdAt:n-7e7},
    {id:uid(),projectId:p3.id,name:'エレベーター設置の建築申請',done:false,due:fd(-3),notes:'構造計算書の再提出が必要。担当部署確認要',createdAt:n-5e7},
    {id:uid(),projectId:p3.id,name:'車椅子スペース拡張設計',done:false,due:fd(8),notes:'JIS基準T1704準拠',createdAt:n-4e7},
    {id:uid(),projectId:p4.id,name:'健康診断の予約',done:false,due:fd(10),notes:'',createdAt:n-1e7},
    {id:uid(),projectId:p4.id,name:'車の車検',done:false,due:fd(25),notes:'',createdAt:n-8e6},
  ];
  notes=[
    {id:uid(),projectId:p1.id,text:'A社の提案がコスト効率良好。ただし工期が2週間長い点を要確認。',createdAt:n-3e7},
    {id:uid(),projectId:p2.id,text:'LED化でランニングコスト約40%削減見込み。初期投資は3,200万円。',createdAt:n-2e7},
    {id:uid(),projectId:'',text:'次回定例：6/15（月）10:00〜 スタジアム会議室B',createdAt:n},
    {id:uid(),projectId:p4.id,text:'ジムの月会費 ¥8,000 引き落とし確認',createdAt:n-5e6},
  ];
  save();
}

/* ══════════ HELPERS ══════════ */
function today(){const d=new Date();d.setHours(0,0,0,0);return d}
function dueDiff(s){if(!s)return null;const d=new Date(s);d.setHours(0,0,0,0);return Math.floor((d-today())/86400000)}
function dueInfo(s,done){
  if(!s)return{label:'',cls:''};
  const[,m,d]=s.split('-');const base=parseInt(m)+'/'+parseInt(d);const diff=dueDiff(s);
  if(done)return{label:base,cls:''};
  if(diff<0)return{label:base+' 超過',cls:'ov'};
  if(diff===0)return{label:base+' 今日',cls:'sn'};
  if(diff<=3)return{label:base+' あと'+diff+'日',cls:'sn'};
  return{label:base,cls:''};
}
function fmtD(ts){const d=new Date(ts);return(d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function sortByDue(arr){return[...arr].sort((a,b)=>{if(!a.due&&!b.due)return 0;if(!a.due)return 1;if(!b.due)return-1;return a.due<b.due?-1:a.due>b.due?1:0})}
function wsInitial(name){return name.trim().slice(0,1)}

/* ══════════ WORKSPACE SWITCHER ══════════ */
function toggleWS(){document.getElementById('wsSwitcher').classList.toggle('open');renderWsPanel()}
function closeWS(){document.getElementById('wsSwitcher').classList.remove('open')}
function renderWsPanel(){
  const cws=workspaces.find(w=>w.id===curWsId);
  document.getElementById('wsHeadName').textContent=cws?cws.name:'';
  const el=document.getElementById('wsListEl');el.innerHTML='';
  workspaces.forEach(w=>{
    const div=document.createElement('div');div.className='ws-list-item';
    div.innerHTML=`<div class="ws-avatar" style="background:${w.color}">${wsInitial(w.name)}</div><span class="ws-item-name">${esc(w.name)}</span>${w.id===curWsId?'<span class="ws-item-check">✓</span>':''}`;
    div.onclick=()=>{switchWs(w.id)};
    el.appendChild(div);
  });
}
function switchWs(id){
  curWsId=id;save();closeWS();renderAll();
}
function openWsSettings(){closeWS();alert('設定機能は準備中です')}
function openNewWsModal(){
  closeWS();
  document.getElementById('wsName').value='';
  buildColorRow();
  openM('mNewWs');
  setTimeout(()=>document.getElementById('wsName').focus(),100);
}
function buildColorRow(){
  const row=document.getElementById('wsColorRow');row.innerHTML='';
  WS_COLORS.forEach((c,i)=>{
    const el=document.createElement('div');
    el.className='ws-color-opt'+(i===0?' sel':'');
    el.style.background=c;el.dataset.color=c;
    el.onclick=()=>{document.querySelectorAll('.ws-color-opt').forEach(x=>x.classList.remove('sel'));el.classList.add('sel')};
    row.appendChild(el);
  });
}
function createWs(){
  const name=document.getElementById('wsName').value.trim();if(!name)return;
  const selCol=document.querySelector('.ws-color-opt.sel');
  const color=selCol?selCol.dataset.color:WS_COLORS[0];
  snapshot();
  const ws={id:uid(),name,color,createdAt:Date.now()};
  workspaces.push(ws);curWsId=ws.id;
  save();closeM('mNewWs');renderAll();
}

/* ══════════ TOPBAR ══════════ */
function updTopBar(){
  const cws=workspaces.find(w=>w.id===curWsId)||workspaces[0];
  if(cws){
    document.getElementById('tbWsAvatar').style.background=cws.color;
    document.getElementById('tbWsAvatar').textContent=wsInitial(cws.name);
    document.getElementById('tbWsName').textContent=cws.name;
  }
  const d=new Date();const wd=['日','月','火','水','木','金','土'][d.getDay()];
  document.getElementById('tbDate').textContent=(d.getMonth()+1)+'/'+d.getDate()+'（'+wd+'）';
  const wt=wsTasks(),tot=wt.length,dn=wt.filter(t=>t.done).length;
  const pct=tot?Math.round(dn/tot*100):0;
  document.getElementById('tbSub').textContent='完了 '+dn+'/'+tot+'件';
  document.getElementById('tbProgLbl').textContent='全体進捗 '+pct+'%';
  document.getElementById('tbPF').style.width=pct+'%';
}

/* ══════════ SIDEBAR ══════════ */
function renderSB(){
  const wp=wsProjects();
  const list=document.getElementById('sbList');list.innerHTML='';
  wp.forEach((p,i)=>{
    const col=PC[i%PC.length];
    const open=tasks.filter(t=>t.projectId===p.id&&!t.done).length;
    const div=document.createElement('div');div.className='sb-item';
    div.innerHTML=`<span class="sb-dot" style="background:${col}"></span><span class="sb-name">${esc(p.name)}</span>${open?`<span class="sb-cnt">${open}</span>`:''}`;
    div.addEventListener('contextmenu',e=>{e.preventDefault();showCtx(e,'proj',p.id)});
    div.onclick=()=>scrollToPg(p.id);list.appendChild(div);
  });
  ['qaProj','npPS','ntProj'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    const prev=el.value;
    el.innerHTML=id==='npPS'?'<option value="">プロジェクト（任意）</option>':'<option value="">選択</option>';
    wp.forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=p.name;el.appendChild(o)});

/* ══════════ TASK LIST ══════════ */
function renderTL(){
  const wrap=document.getElementById('tlContent');wrap.innerHTML='';
  const wp=wsProjects();
  if(!wp.length){wrap.innerHTML='<div class="empty-s"><div class="ei">🗂</div><p>このワークスペースにプロジェクトがありません<br><br><button class="btn btn-primary btn-sm" onclick="openNewProj()">＋ 新しいプロジェクト</button></p></div>';return}
  wp.forEach((p,pi)=>{
    const col=PC[pi%PC.length];
    const pt=tasks.filter(t=>t.projectId===p.id);
    const open=sortByDue(pt.filter(t=>!t.done));
    const done=pt.filter(t=>t.done);
    const coll=colSt[p.id],dcoll=doneSt[p.id]!==false;
    const grp=document.createElement('div');grp.className='pg';grp.id='pg-'+p.id;
    const hdr=document.createElement('div');hdr.className='pg-hdr';
    hdr.innerHTML=`<span class="pg-arrow${coll?' coll':''}">▼</span><span class="pg-bar" style="background:${col}"></span><span class="pg-title">${esc(p.name)}</span><span class="pg-meta">${open.length}件</span><button class="pg-add" onclick="event.stopPropagation();openNewTaskModal('${p.id}')">＋ 追加</button>`;
    hdr.addEventListener('contextmenu',e=>{e.preventDefault();showCtx(e,'proj',p.id)});
    hdr.onclick=e=>{if(e.target.classList.contains('pg-add'))return;colSt[p.id]=!colSt[p.id];save();renderTL()};
    grp.appendChild(hdr);
    const rows=document.createElement('div');
    if(coll)rows.style.display='none';
    open.forEach(t=>rows.appendChild(buildRow(t,col)));
    // invisible drop zone → mark as done
    const dz=makeDropZone(p.id,true);rows.appendChild(dz);
    if(done.length){
      const dh=document.createElement('div');dh.className='done-hdr';
      dh.innerHTML=`<span class="done-arrow${dcoll?' coll':''}">▼</span><span class="done-lbl">完了済み (${done.length})</span>`;
      dh.onclick=()=>{doneSt[p.id]=!doneSt[p.id];save();renderTL()};
      rows.appendChild(dh);
      const dr=document.createElement('div');
      if(dcoll)dr.style.display='none';
      // invisible drop zone → mark as open
      const dz2=makeDropZone(p.id,false);dr.appendChild(dz2);
      done.forEach(t=>dr.appendChild(buildRow(t,col)));
      rows.appendChild(dr);
    } else {
      const dz2=makeDropZone(p.id,false);rows.appendChild(dz2);
    }
    grp.appendChild(rows);wrap.appendChild(grp);
  });
}

function makeDropZone(pid,toDone){
  const dz=document.createElement('div');
  dz.className='drop-zone-inv';
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('active')});
  dz.addEventListener('dragleave',()=>dz.classList.remove('active'));
  dz.addEventListener('drop',e=>{
    e.preventDefault();dz.classList.remove('active');
    if(!_dragId)return;
    snapshot();
    const t=tasks.find(x=>x.id===_dragId);if(!t)return;
    t.done=toDone;t.projectId=pid;
    save();renderAll();
  });
  return dz;
}

function buildRow(t,col){
  const row=document.createElement('div');
  row.className='tr';row.dataset.tid=t.id;row.dataset.pid=t.projectId;row.draggable=true;
  const di=dueInfo(t.due,t.done);
  const chkStyle=t.done?`background:${col};border-color:${col}`:`border-color:${col}50`;
  row.innerHTML=`<span class="dh" draggable="false">⠿</span>
    <button class="chk${t.done?' checked':''}" style="${chkStyle}" onclick="event.stopPropagation();toggleDone('${t.id}')"></button>
    <div class="tr-nw">
      <span class="tr-nm${t.done?' done':''}">${esc(t.name)}</span>
      ${t.notes?`<span class="tr-sb">${esc(t.notes.slice(0,60))}${t.notes.length>60?'…':''}</span>`:''}
    </div>
    <div class="tr-right">${di.label?`<span class="tr-due${di.cls?' '+di.cls:''}">${di.label}</span>`:''}</div>`;
  row.onclick=()=>openDet(t.id);
  row.addEventListener('contextmenu',e=>{e.preventDefault();showCtx(e,'task',t.id)});
  row.addEventListener('dragstart',e=>{_dragId=t.id;row.classList.add('dragging');e.dataTransfer.effectAllowed='move'});
  row.addEventListener('dragend',()=>{row.classList.remove('dragging');document.querySelectorAll('.drag-over-top,.drag-over-bot').forEach(r=>r.classList.remove('drag-over-top','drag-over-bot'))});
  row.addEventListener('dragover',e=>{
    e.preventDefault();const rect=row.getBoundingClientRect();
    row.classList.remove('drag-over-top','drag-over-bot');
    if(e.clientY<rect.top+rect.height/2)row.classList.add('drag-over-top');else row.classList.add('drag-over-bot');
  });
  row.addEventListener('dragleave',()=>row.classList.remove('drag-over-top','drag-over-bot'));
  row.addEventListener('drop',e=>{
    e.preventDefault();row.classList.remove('drag-over-top','drag-over-bot');
    if(!_dragId||_dragId===t.id)return;
    snapshot();
    const from=tasks.find(x=>x.id===_dragId);const to=tasks.find(x=>x.id===t.id);
    if(!from||!to)return;
    from.projectId=to.projectId;from.done=to.done;
    tasks.splice(tasks.indexOf(from),1);
    const ti=tasks.indexOf(to);const rect=row.getBoundingClientRect();
    tasks.splice(e.clientY<rect.top+rect.height/2?ti:ti+1,0,from);
    save();renderAll();
  });
  return row;
}

/* ── ワークスペースのデータをコンテキストに変換 ── */
function buildAIContext(){
  const t0=new Date(); t0.setHours(0,0,0,0);
  const cws=workspaces.find(w=>w.id===curWsId)||workspaces[0];
  const wp=wsProjects(), wt=wsTasks(), wn=wsNotes();
  const wd=['日','月','火','水','木','金','土'][t0.getDay()];
  let ctx='# ワークスペース: '+(cws?cws.name:'')+
    '\n今日: '+(t0.getMonth()+1)+'/'+(t0.getDate())+'（'+wd+'）\n\n## プロジェクト\n';
  wp.forEach(p=>{
    const pt=wt.filter(t=>t.projectId===p.id);
    const open=[...pt.filter(t=>!t.done)].sort((a,b)=>(!a.due&&!b.due)?0:!a.due?1:!b.due?-1:a.due<b.due?-1:1);
    const done=pt.filter(t=>t.done);
    ctx+='\n### '+p.name+'（未完了:'+open.length+' 完了:'+done.length+'）\n';
    open.forEach(t=>{
      const diff=t.due?Math.floor((new Date(t.due)-t0)/86400000):null;
      let ds=t.due?(' [期日'+t.due+(diff<0?' 超過'+Math.abs(diff)+'日前':diff===0?' 今日':' あと'+diff+'日')+']'):'';
      ctx+='- （未完了）'+t.name+ds+(t.notes?' ※'+t.notes.slice(0,60):'')+' \n';
    });
    if(done.length) ctx+='- 完了済: '+done.map(t=>t.name).join(', ')+'\n';
  });
  if(wn.length){
    ctx+='\n## メモ\n';
    wn.forEach(n=>{ const p=wp.find(x=>x.id===n.projectId); ctx+='- '+(p?'['+p.name+'] ':'')+n.text+'\n'; });
  }
  return ctx;
}
function buildSysPrompt(){
  return 'あなたはTaskDock（タスク管理アプリ）のAIアシスタントです。\nユーザーはJクラブ（プロサッカークラブ）のスタジアム施設担当者です。\n以下のワークスペースデータを参照し、タスク管理・優先度・スケジュールについて実用的にサポートしてください。\n回答は簡潔かつ具体的に。必要に応じてMarkdown（箇条書き・太字）を使用。日本語で回答。\n\n'+buildAIContext();
}

/* ── Anthropic API呼び出し（Artifact内 = APIキー不要） ── */
async function callAnthropicAPI(msgs){
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1500,
      system: buildSysPrompt(),
      messages: msgs.map(m=>({
        role: m.role === 'assistant' ? 'assistant' : 'user',
        content: m.content
      }))
    })
  });
  const data = await response.json();
  if(!response.ok){
    const msg = data.error?.message || '';
    if(response.status===529) throw new Error('Claudeが混雑しています。少し待ってから再試行してください。');
    throw new Error('APIエラー(' + response.status + '): ' + msg);
  }
  const block = data.content?.find(b => b.type === 'text');
  if(!block) throw new Error('応答が空でした。もう一度お試しください。');
  return block.text;
}

/* ── メッセージ送信 ── */
async function sendAI(){
  if(aiLoading) return;
  const input = document.getElementById('aiInput');
  const text = input.value.trim();
  if(!text) return;
  aiHistory.push({role:'user', content:text});
  addAIBubble('user', text);
  input.value=''; aiAutoResize(input);
  aiLoading=true;
  document.getElementById('aiSendBtn').disabled=true;
  const lid = addAIBubble('ai','<div class="ai-dots"><span></span><span></span><span></span></div>',true);
  try{
    const reply = await callAnthropicAPI(aiHistory);
    updAIBubble(lid, reply, 'ai');
    aiHistory.push({role:'assistant', content:reply});
  }catch(err){
    let msg = err.message;
    if(msg.includes('credit')||msg.includes('quota')) msg='利用制限に達しました。しばらく待ってから再試行してください。';
    updAIBubble(lid, 'エラー: '+msg, 'error');
    aiHistory.pop();
  }finally{
    aiLoading=false;
    document.getElementById('aiSendBtn').disabled=false;
  }
}
function quickPrompt(t){document.getElementById('aiInput').value=t; sendAI();}

/* ── チャットバブル ── */
function addAIBubble(role,content,raw=false){
  const chat=document.getElementById('aiChat');
  const div=document.createElement('div');
  const id='aib-'+(++_aiMsgIdx); div.id=id;
  div.className='ai-msg '+role;
  if(raw) div.innerHTML=content; else div.innerHTML=aiMd(content);
  chat.appendChild(div); chat.scrollTop=chat.scrollHeight; return id;
}
function updAIBubble(id,text,cls){
  const el=document.getElementById(id); if(!el)return;
  el.className='ai-msg '+cls; el.innerHTML=aiMd(text);
  el.parentElement?.scrollTo({top:99999,behavior:'smooth'});
}
/* Markdownレンダラー */
function aiMd(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code style="background:var(--bg3);padding:1px 4px;border-radius:3px;font-size:11px;font-family:monospace">$1</code>')
    .replace(/^#{1,3}\s+(.+)$/gm,'<div style="font-weight:700;margin:7px 0 3px;font-size:13px">$1</div>')
    .replace(/^[-*]\s+(.+)$/gm,'<div style="padding-left:10px;margin:1px 0">・$1</div>')
    .replace(/^(\d+)\.\s+(.+)$/gm,'<div style="padding-left:10px;margin:1px 0">$1. $2</div>')
    .replace(/\n{2,}/g,'<br><br>').replace(/\n/g,'<br>');
}
function aiAutoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
</script>

<!-- ══ AI OVERLAY (mobile) ══ -->

        placeholder="質問や指示を入力...（Shift+Enterで送信）"

      <button class="ai-send" id="aiSendBtn" onclick="sendAI()">➤</button>
